version: "3.8"

networks:
  monitoring:
    name: ${MONITORING_NETWORK:-monitoring}
    external: true

services:
  postgres_exporter:
    image: ${POSTGRES_EXPORTER_IMAGE:-prometheuscommunity/postgres-exporter:latest}
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_DATA_SOURCE_NAME:?POSTGRES_DATA_SOURCE_NAME is required}
    networks:
      - monitoring
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M
