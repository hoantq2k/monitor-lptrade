version: "3.8"

networks:
  monitoring:
    name: ${MONITORING_NETWORK:-monitoring}
    external: true
  tools_dmz:
    name: ${TOOLS_NETWORK:-nw_dmz}
    external: true

configs:
  prometheus_config:
    file: ./prometheus/prometheus.yml
  prometheus_rules:
    file: ./prometheus/rules.yml
  alertmanager_config:
    file: ./.generated/alertmanager.yml
  blackbox_config:
    file: ./blackbox/blackbox.yml

services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
      - "--web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://prometheus:9090}"
      - "--web.enable-lifecycle"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_rules
        target: /etc/prometheus/rules.yml
    volumes:
      - prometheus_data:/prometheus
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: ingress
    networks:
      - monitoring
      - tools_dmz
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 128M

  node_exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:latest}
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - monitoring
    deploy:
      mode: global
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:latest}
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
      - "--max_housekeeping_interval=35s"
      - "--event_storage_event_limit=default=0"
      - "--event_storage_age_limit=default=0"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
    networks:
      - monitoring
    deploy:
      mode: global
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 128M

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:latest}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
    volumes:
      - alertmanager_data:/alertmanager
    ports:
      - target: 9093
        published: 9093
        protocol: tcp
        mode: ingress
    networks:
      - monitoring
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  prometheus_msteams:
    image: ${PROMETHEUS_MSTEAMS_IMAGE:-quay.io/prometheusmsteams/prometheus-msteams:latest}
    environment:
      TEAMS_INCOMING_WEBHOOK_URL: ${MS_TEAMS_WEBHOOK_URL:-CHANGE_ME_MS_TEAMS_WEBHOOK_URL}
      TEAMS_REQUEST_URI: alertmanager
    networks:
      - monitoring
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  postgres_exporter:
    image: ${POSTGRES_EXPORTER_IMAGE:-prometheuscommunity/postgres-exporter:latest}
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_DATA_SOURCE_NAME:?POSTGRES_DATA_SOURCE_NAME is required}
    networks:
      - monitoring
      - tools_dmz
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  blackbox_exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE:-prom/blackbox-exporter:latest}
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    configs:
      - source: blackbox_config
        target: /etc/blackbox_exporter/config.yml
    networks:
      - monitoring
      - tools_dmz
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  redis_exporter_master:
    image: ${REDIS_EXPORTER_IMAGE:-oliver006/redis_exporter:latest}
    command:
      - "--redis.addr=redis://${TOOLS_STACK_NAME:-tools}_cache-redis-master:6379"
    networks:
      - monitoring
      - tools_dmz
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  redis_exporter_slave:
    image: ${REDIS_EXPORTER_IMAGE:-oliver006/redis_exporter:latest}
    command:
      - "--redis.addr=redis://${TOOLS_STACK_NAME:-tools}_cache-redis-slave:6379"
    networks:
      - monitoring
      - tools_dmz
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  redis_exporter_socket:
    image: ${REDIS_EXPORTER_IMAGE:-oliver006/redis_exporter:latest}
    command:
      - "--redis.addr=redis://${TOOLS_STACK_NAME:-tools}_cache-redis-socket:6379"
    networks:
      - monitoring
      - tools_dmz
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  redis_exporter_market:
    image: ${REDIS_EXPORTER_IMAGE:-oliver006/redis_exporter:latest}
    command:
      - "--redis.addr=redis://${TOOLS_STACK_NAME:-tools}_cache-redis-market:6379"
    networks:
      - monitoring
      - tools_dmz
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  redis_exporter_pubsub:
    image: ${REDIS_EXPORTER_IMAGE:-oliver006/redis_exporter:latest}
    command:
      - "--redis.addr=redis://${TOOLS_STACK_NAME:-tools}_cache-redis-pubsub:6379"
    networks:
      - monitoring
      - tools_dmz
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

volumes:
  prometheus_data:
  alertmanager_data:
