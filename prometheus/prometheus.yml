global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node_exporter
    dns_sd_configs:
      - names:
          - tasks.node_exporter
        type: A
        port: 9100

  - job_name: cadvisor
    dns_sd_configs:
      - names:
          - tasks.cadvisor
        type: A
        port: 8080

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: postgres_exporter
    static_configs:
      - targets:
          - postgres_exporter:9187
