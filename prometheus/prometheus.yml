global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node_exporter
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 9100
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_node_exporter
        action: keep
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance

  - job_name: cadvisor
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 8080
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_cadvisor
        action: keep
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: postgres_exporter
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 9187
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_postgres_exporter
        action: keep
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance
