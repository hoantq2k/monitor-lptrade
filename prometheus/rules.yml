groups:
  - name: basic-host-container-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Instance down: {{ $labels.instance }}"
          description: "Prometheus cannot scrape {{ $labels.job }} on {{ $labels.instance }}."

      - alert: HostDiskUsageHigh
        expr: 100 - ((node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} * 100) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage high: {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: "Disk usage is above 85% for more than 10 minutes."

      - alert: HostDiskUsageCritical
        expr: 100 - ((node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} * 100) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage critical: {{ $labels.instance }} {{ $labels.mountpoint }}"
          description: "Disk usage is above 95%."

      - alert: HostMemoryUsageHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage high: {{ $labels.instance }}"
          description: "Memory usage is above 90% for more than 10 minutes."
