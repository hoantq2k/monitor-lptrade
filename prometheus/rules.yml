groups:
  - name: basic-host-container-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Mất kết nối giám sát tới dịch vụ {{ $labels.job }}"
          description: "Prometheus không thể thu thập metrics từ {{ $labels.job }} tại {{ $labels.instance }} trong hơn 2 phút. Vui lòng kiểm tra trạng thái service, kết nối mạng và máy đích."

      - alert: HostDiskUsageHigh
        expr: 100 - ((node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} * 100) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cảnh báo: Phân vùng {{ $labels.mountpoint }} trên máy {{ $labels.nodename }} đang sử dụng cao"
          description: "Dung lượng ổ đĩa trên máy {{ $labels.nodename }} ({{ $labels.host_ip }}) tại phân vùng {{ $labels.mountpoint }} đã vượt 85% trong hơn 10 phút. Thiết bị: {{ $labels.device }}. Vui lòng kiểm tra log, dữ liệu phát sinh nhanh hoặc dung lượng còn trống."

      - alert: HostDiskUsageCritical
        expr: 100 - ((node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"} * 100) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Khẩn cấp: Phân vùng {{ $labels.mountpoint }} trên máy {{ $labels.nodename }} gần đầy"
          description: "Dung lượng ổ đĩa trên máy {{ $labels.nodename }} ({{ $labels.host_ip }}) tại phân vùng {{ $labels.mountpoint }} đã vượt 95%. Thiết bị: {{ $labels.device }}. Cần xử lý sớm để tránh ảnh hưởng dịch vụ."

      - alert: HostMemoryUsageHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cảnh báo: Bộ nhớ trên máy {{ $labels.nodename }} đang sử dụng cao"
          description: "Mức sử dụng bộ nhớ trên máy {{ $labels.nodename }} ({{ $labels.host_ip }}) đã vượt 90% trong hơn 10 phút. Vui lòng kiểm tra các tiến trình đang chiếm nhiều RAM."
