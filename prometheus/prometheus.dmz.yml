global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules.yml

# Prometheus config cho cum DMZ.
# Job filter dua tren service name cua stack `tools` (tools_postgresql,
# tools_rabbitmq*, tools_cache-redis-*, tools_bps_haproxy) va cua stack
# monitoring (regex `.+_*_exporter`).
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service_name: prometheus
          cluster: dmz

  - job_name: node_exporter
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 9100
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_node_exporter
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - target_label: cluster
        replacement: dmz

  - job_name: cadvisor
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 8080
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_cadvisor
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: instance
        replacement: '$1'
      - target_label: cluster
        replacement: dmz

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          service_name: alertmanager
          cluster: dmz

  - job_name: postgres_exporter
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 9187
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_postgres_exporter
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance
      - target_label: cluster
        replacement: dmz

  - job_name: redis_exporter
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 9121
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_redis_exporter_.+
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_redis_exporter_(.+)
        target_label: redis_role
        replacement: '$1'
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance
      - target_label: cluster
        replacement: dmz

  - job_name: rabbitmq
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 15692
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: tools_rabbitmq(-seed)?
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance
      - target_label: cluster
        replacement: dmz

  - job_name: haproxy_exporter
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 9101
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_haproxy_exporter_.+
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__meta_dockerswarm_service_name]
        regex: .+_haproxy_exporter_(.+)
        target_label: haproxy_target
        replacement: '$1'
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: instance
      - target_label: cluster
        replacement: dmz

  - job_name: blackbox_haproxy_tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 9000
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: tools_bps_haproxy
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__address__]
        target_label: target
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance
      - target_label: cluster
        replacement: dmz
      - target_label: __address__
        replacement: blackbox_exporter:9115

  - job_name: blackbox_postgresql_tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 5432
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: tools_postgresql(_slave)?
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__address__]
        target_label: target
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance
      - target_label: cluster
        replacement: dmz
      - target_label: __address__
        replacement: blackbox_exporter:9115

  - job_name: blackbox_rabbitmq_tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 5672
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: tools_rabbitmq(-seed)?
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__address__]
        target_label: target
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: instance
      - target_label: cluster
        replacement: dmz
      - target_label: __address__
        replacement: blackbox_exporter:9115

  - job_name: blackbox_redis_tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    dockerswarm_sd_configs:
      - host: unix:///var/run/docker.sock
        role: tasks
        port: 6379
        filters:
          - name: desired-state
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_dockerswarm_service_name]
        regex: tools_cache-redis-.+
        action: keep
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: service_name
      - source_labels: [__meta_dockerswarm_service_name]
        regex: tools_(cache-redis-.+)
        target_label: redis_role
        replacement: '$1'
      - source_labels: [__address__]
        target_label: target
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__meta_dockerswarm_node_hostname]
        target_label: nodename
      - source_labels: [__meta_dockerswarm_node_address]
        target_label: host_ip
      - source_labels: [__meta_dockerswarm_service_name]
        target_label: instance
      - target_label: cluster
        replacement: dmz
      - target_label: __address__
        replacement: blackbox_exporter:9115
