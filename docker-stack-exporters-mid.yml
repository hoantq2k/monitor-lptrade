version: "3.8"

# Monitoring stack cho cum MID.
# - Attach vao overlay `backend` cua cum MID de scrape/probe cac service `femid`
#   (bpsbase, bpsreport, bpsreportbroker, external, haproxy).
# - Khong bao gom postgres_exporter/redis_exporter/rabbitmq scrape vi cum MID
#   khong chay Postgres, Redis hay RabbitMQ. Blackbox chi probe HAProxy cua femid.
# - Prerequisites: overlay networks `${MONITORING_NETWORK}` va `${TOOLS_NETWORK}`
#   (mac dinh la `backend`) phai duoc tao truoc tren swarm MID va co attachable=true.

networks:
  monitoring:
    name: ${MONITORING_NETWORK:-monitoring}
    external: true
  tools_mid:
    name: ${TOOLS_NETWORK:-backend}
    external: true

configs:
  prometheus_config:
    file: ./prometheus/prometheus.mid.yml
  prometheus_rules:
    file: ./prometheus/rules.yml
  alertmanager_config:
    file: ./.generated/alertmanager.yml
  blackbox_config:
    file: ./blackbox/blackbox.yml

services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
      - "--web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://prometheus:9090}"
      - "--web.enable-lifecycle"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
      - source: prometheus_rules
        target: /etc/prometheus/rules.yml
    volumes:
      - prometheus_data:/prometheus
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: ingress
    networks:
      - monitoring
      - tools_mid
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        # Pin ve node co label monitor=true de volume `prometheus_data` (local
        # driver) khong bi rong khi task reschedule sang manager khac.
        # Bat buoc la manager vi Docker Swarm SD can Docker API cua manager;
        # neu label monitor=true lo gan len worker, Prometheus SD se rong.
        # Gan label truoc khi deploy tren manager MID:
        #   docker node update --label-add monitor=true <hostname>
        constraints:
          - node.labels.monitor == true
          - node.role == manager
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 128M

  node_exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:latest}
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - monitoring
    deploy:
      mode: global
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:latest}
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
      - "--max_housekeeping_interval=35s"
      - "--event_storage_event_limit=default=0"
      - "--event_storage_age_limit=default=0"
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "${DOCKER_DATA_ROOT:-/var/lib/docker}/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
    networks:
      - monitoring
    deploy:
      mode: global
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          memory: 128M

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:latest}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=:9093"
    configs:
      - source: alertmanager_config
        target: /etc/alertmanager/alertmanager.yml
    volumes:
      - alertmanager_data:/alertmanager
    ports:
      - target: 9093
        published: 9093
        protocol: tcp
        mode: ingress
    networks:
      - monitoring
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        # Cung node voi Prometheus de giu silence/notification state.
        constraints:
          - node.labels.monitor == true
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  prometheus_msteams:
    image: ${PROMETHEUS_MSTEAMS_IMAGE:-quay.io/prometheusmsteams/prometheus-msteams:latest}
    environment:
      TEAMS_INCOMING_WEBHOOK_URL: ${MS_TEAMS_WEBHOOK_URL:-CHANGE_ME_MS_TEAMS_WEBHOOK_URL}
      TEAMS_REQUEST_URI: alertmanager
    networks:
      - monitoring
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        # Co-locate voi Alertmanager cho de debug (stateless, khong bat buoc).
        constraints:
          - node.labels.monitor == true
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  blackbox_exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE:-prom/blackbox-exporter:latest}
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    configs:
      - source: blackbox_config
        target: /etc/blackbox_exporter/config.yml
    networks:
      - monitoring
      - tools_mid
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.labels.monitor == true
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
        reservations:
          memory: 32M

  # HAProxy exporter cho femid_haproxy.
  haproxy_exporter_mid:
    image: ${HAPROXY_EXPORTER_IMAGE:-prom/haproxy-exporter:latest}
    command:
      - "--haproxy.scrape-uri=http://${HAPROXY_STATS_USER:-admin}:${HAPROXY_STATS_PASSWORD:-admin}@femid_haproxy:9000/;csv"
    networks:
      - monitoring
      - tools_mid
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.labels.monitor == true
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          memory: 16M

volumes:
  prometheus_data:
  alertmanager_data:
